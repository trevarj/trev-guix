name: Guix channel checks

on:
  push:
  workflow_dispatch:

jobs:
  channel:
    runs-on: codeberg-medium
    steps:
      - name: Check out repository
        uses: https://data.forgejo.org/actions/checkout@v4

      - name: Install Guix
        run: |
          set -euxo pipefail

          wget -nv 'https://ci.guix.gnu.org/search/latest/archive?query=spec:tarball+status:success+system:x86_64-linux+guix-binary.tar.xz' \
            -O guix-binary-nightly.x86_64-linux.tar.xz

          sudo tar --extract --file guix-binary-nightly.x86_64-linux.tar.xz \
            -C / --no-overwrite-dir

          sudo groupadd --system guixbuild || true
          for i in $(seq -w 1 10); do
            sudo useradd -g guixbuild -G guixbuild -d /var/empty \
              -s "$(command -v nologin)" -c "Guix build user $i" \
              --system "guixbuilder${i}" || true
          done

          GUIX=/var/guix/profiles/per-user/root/current-guix/bin/guix
          GUIX_DAEMON=/var/guix/profiles/per-user/root/current-guix/bin/guix-daemon

          for key in /var/guix/profiles/per-user/root/current-guix/share/guix/*.pub; do
            sudo "$GUIX" archive --authorize < "$key"
          done
          sudo "$GUIX" archive --generate-key || true

          sudo "$GUIX_DAEMON" \
            --build-users-group=guixbuild \
            --disable-chroot \
            --discover=no \
            > "$RUNNER_TEMP/guix-daemon.log" 2>&1 &

          echo "/var/guix/profiles/per-user/root/current-guix/bin" >> "$GITHUB_PATH"
          sleep 2

      - name: Fetch nonguix channel
        run: |
          set -euxo pipefail
          git clone https://gitlab.com/nonguix/nonguix "$RUNNER_TEMP/nonguix"
          git -C "$RUNNER_TEMP/nonguix" checkout 0107c1c4849460b567424ba2cdc8942294c7a611
          sed -i 's/,@arguments/,@(package-arguments package64)/' \
            "$RUNNER_TEMP/nonguix/nonguix/utils.scm"

      - name: Show Guix version
        run: guix --version

      - name: Check Guix channel packages
        run: GUIX_EXTRA_LOAD_PATHS="$RUNNER_TEMP/nonguix" bash ./scripts/check-channel-packages --all
